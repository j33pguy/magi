syntax = "proto3";
package memory.v1;
option go_package = "github.com/j33pguy/magi/proto/memory/v1;memorypb";

import "google/api/annotations.proto";

service MemoryService {
  rpc Remember(RememberRequest) returns (RememberResponse) {
    option (google.api.http) = {
      post: "/remember"
      body: "*"
    };
  }
  rpc Recall(RecallRequest) returns (RecallResponse) {
    option (google.api.http) = {
      post: "/recall"
      body: "*"
    };
  }
  rpc Forget(ForgetRequest) returns (ForgetResponse) {
    option (google.api.http) = {
      delete: "/memories/{id}"
    };
  }
  rpc List(ListRequest) returns (ListResponse) {
    option (google.api.http) = {
      get: "/memories"
    };
  }
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/health"
    };
  }
  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse) {
    option (google.api.http) = {
      post: "/conversations"
      body: "*"
    };
  }
  rpc SearchConversations(SearchConversationsRequest) returns (SearchConversationsResponse) {
    option (google.api.http) = {
      post: "/conversations/search"
      body: "*"
    };
  }
  rpc LinkMemories(LinkMemoriesRequest) returns (LinkMemoriesResponse) {
    option (google.api.http) = {
      post: "/links"
      body: "*"
    };
  }
  rpc GetRelated(GetRelatedRequest) returns (GetRelatedResponse) {
    option (google.api.http) = {
      get: "/memories/{memory_id}/related"
    };
  }

  // Task queue
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse) {
    option (google.api.http) = {
      post: "/tasks"
      body: "*"
    };
  }
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = {
      get: "/tasks"
    };
  }
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse) {
    option (google.api.http) = {
      get: "/tasks/{id}"
    };
  }
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse) {
    option (google.api.http) = {
      patch: "/tasks/{id}"
      body: "*"
    };
  }
  rpc CreateTaskEvent(CreateTaskEventRequest) returns (CreateTaskEventResponse) {
    option (google.api.http) = {
      post: "/tasks/{task_id}/events"
      body: "*"
    };
  }
  rpc ListTaskEvents(ListTaskEventsRequest) returns (ListTaskEventsResponse) {
    option (google.api.http) = {
      get: "/tasks/{task_id}/events"
    };
  }
}

// Memory is the core memory record.
message Memory {
  string id = 1;
  string content = 2;
  string summary = 3;
  string project = 4;
  string type = 5;
  string visibility = 6;
  string source = 7;
  string source_file = 8;
  string parent_id = 9;
  int32 chunk_index = 10;
  string created_at = 11;
  string updated_at = 12;
  int32 token_count = 13;
  repeated string tags = 14;
  // Taxonomy: who said/wrote this (user, assistant, agent, system)
  string speaker = 15;
  // Taxonomy: top-level domain (work, infrastructure, development, personal, project, meta)
  string area = 16;
  // Taxonomy: sub-domain, free-form (power-platform, networking, magi, etc.)
  string sub_area = 17;
}

// MemoryResult wraps a Memory with relevance scores from hybrid search.
message MemoryResult {
  Memory memory = 1;
  double rrf_score = 2;
  int32 vec_rank = 3;
  int32 bm25_rank = 4;
  double distance = 5;
  double score = 6;
  double recency_weight = 7;
  double weighted_score = 8;
}

// Remember
message RememberRequest {
  string content = 1;
  string summary = 2;
  string project = 3;
  string type = 4;
  string visibility = 5;
  repeated string tags = 6;
  string source = 7;
  string speaker = 8;  // user, assistant, agent, system
  string area = 9;     // work, infrastructure, development, personal, project, meta
  string sub_area = 10; // free-form sub-domain
}

message RememberResponse {
  string id = 1;
  bool ok = 2;
  string tag_warning = 3;
}

// Recall
message RecallRequest {
  string query = 1;
  string project = 2;
  repeated string projects = 3;
  string type = 4;
  repeated string tags = 5;
  int32 top_k = 6;
  double min_relevance = 7;
  double recency_decay = 8;
  string speaker = 9;
  string area = 10;
  string sub_area = 11;
  string after_time = 12;   // only memories after this time (ISO-8601 or relative: 7d, 2w, 1m)
  string before_time = 13;  // only memories before this time
}

message RecallResponse {
  repeated MemoryResult results = 1;
  bool rewritten = 2;
  string rewritten_query = 3;
  int32 attempts = 4;
}

// Forget
message ForgetRequest {
  string id = 1;
}

message ForgetResponse {
  string id = 1;
  bool ok = 2;
}

// List
message ListRequest {
  int32 limit = 1;
  int32 offset = 2;
  string project = 3;
  string type = 4;
  string tags = 5; // comma-separated for HTTP GET query param compat
  string speaker = 6;
  string area = 7;
  string sub_area = 8;
  string after_time = 9;   // only memories after this time (ISO-8601 or relative: 7d, 2w, 1m)
  string before_time = 10;  // only memories before this time
}

message ListResponse {
  repeated Memory memories = 1;
}

// Health
message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string version = 2;
}

// CreateConversation
message CreateConversationRequest {
  string channel = 1;
  string summary = 2;
  string session_key = 3;
  string started_at = 4;
  string ended_at = 5;
  int32 turn_count = 6;
  repeated string topics = 7;
  repeated string decisions = 8;
  repeated string action_items = 9;
}

message CreateConversationResponse {
  string id = 1;
  bool ok = 2;
  string tag_warning = 3;
}

// MemoryLink represents a directed relationship between two memories.
message MemoryLink {
  string id = 1;
  string from_id = 2;
  string to_id = 3;
  string relation = 4;
  double weight = 5;
  bool auto = 6;
  string created_at = 7;
}

// LinkMemories
message LinkMemoriesRequest {
  string from_id = 1;
  string to_id = 2;
  string relation = 3;
  double weight = 4;
}

message LinkMemoriesResponse {
  MemoryLink link = 1;
}

// GetRelated
message GetRelatedRequest {
  string memory_id = 1;
  int32 depth = 2;
  string direction = 3;
}

message GetRelatedResponse {
  repeated Memory memories = 1;
  repeated MemoryLink links = 2;
}

// GetMemoryHistory
message GetMemoryHistoryRequest {
  string id = 1;
}

message HistoryEntry {
  string hash = 1;
  string message = 2;
  string date = 3;
}

message GetMemoryHistoryResponse {
  repeated HistoryEntry entries = 1;
}

// GetMemoryDiff
message GetMemoryDiffRequest {
  string id = 1;
  string from_commit = 2;
  string to_commit = 3;
}

message GetMemoryDiffResponse {
  string from_content = 1;
  string to_content = 2;
  string diff = 3;
}

// SearchConversations
message SearchConversationsRequest {
  string query = 1;
  int32 limit = 2;
  string channel = 3;
  double min_relevance = 4;
  double recency_decay = 5;
}

message SearchConversationsResponse {
  repeated MemoryResult results = 1;
  bool rewritten = 2;
  string rewritten_query = 3;
  int32 attempts = 4;
}

// Task is a queue item for tracking shared progress.
message Task {
  string id = 1;
  string project = 2;
  string queue = 3;
  string title = 4;
  string summary = 5;
  string description = 6;
  string status = 7;
  string priority = 8;
  string created_by = 9;
  string orchestrator = 10;
  string worker = 11;
  string parent_task_id = 12;
  map<string, string> metadata = 13;
  string created_at = 14;
  string updated_at = 15;
  string started_at = 16;
  string completed_at = 17;
  string failed_at = 18;
  string blocked_at = 19;
}

// TaskEvent is an append-only activity record inside a task.
message TaskEvent {
  string id = 1;
  string task_id = 2;
  string event_type = 3;
  string actor_role = 4;
  string actor_name = 5;
  string actor_user = 6;
  string actor_machine = 7;
  string actor_agent = 8;
  string summary = 9;
  string content = 10;
  string status = 11;
  string memory_id = 12;
  string source = 13;
  map<string, string> metadata = 14;
  string created_at = 15;
}

// CreateTask
message CreateTaskRequest {
  string project = 1;
  string queue = 2;
  string title = 3;
  string summary = 4;
  string description = 5;
  string status = 6;
  string priority = 7;
  string created_by = 8;
  string orchestrator = 9;
  string worker = 10;
  string parent_task_id = 11;
  map<string, string> metadata = 12;
}

message CreateTaskResponse {
  Task task = 1;
}

// ListTasks
message ListTasksRequest {
  string project = 1;
  string queue = 2;
  string status = 3;
  string worker = 4;
  string orchestrator = 5;
  int32 limit = 6;
}

message ListTasksResponse {
  repeated Task tasks = 1;
}

// GetTask
message GetTaskRequest {
  string id = 1;
}

message GetTaskResponse {
  Task task = 1;
}

// UpdateTask
message UpdateTaskRequest {
  string id = 1;
  string project = 2;
  string queue = 3;
  string title = 4;
  string summary = 5;
  string description = 6;
  string status = 7;
  string priority = 8;
  string created_by = 9;
  string orchestrator = 10;
  string worker = 11;
  string parent_task_id = 12;
  map<string, string> metadata = 13;
}

message UpdateTaskResponse {
  Task task = 1;
}

// CreateTaskEvent
message CreateTaskEventRequest {
  string task_id = 1;
  string event_type = 2;
  string actor_role = 3;
  string actor_name = 4;
  string actor_user = 5;
  string actor_machine = 6;
  string actor_agent = 7;
  string summary = 8;
  string content = 9;
  string status = 10;
  string memory_id = 11;
  string source = 12;
  map<string, string> metadata = 13;
}

message CreateTaskEventResponse {
  TaskEvent event = 1;
}

// ListTaskEvents
message ListTaskEventsRequest {
  string task_id = 1;
  int32 limit = 2;
}

message ListTaskEventsResponse {
  repeated TaskEvent events = 1;
}
