name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build & Release
    runs-on: [self-hosted, linux, x64]
    if: github.actor == 'j33pguy'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tests
        run: CGO_ENABLED=1 go test ./... -count=1 -short

      - name: Build binaries
        run: |
          mkdir -p dist
          # CGO required for SQLite + ONNX runtime
          # Cross-compilation only works for Linux targets on Linux runners
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/magi-linux-amd64 .
          # arm64 cross-compile needs cross-compiler toolchain — skip if unavailable
          if command -v aarch64-linux-gnu-gcc &>/dev/null; then
            CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/magi-linux-arm64 .
          fi
          cd dist && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Image
    runs-on: [self-hosted, linux, x64]
    needs: build
    if: github.actor == 'j33pguy'

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          docker build -t ghcr.io/j33pguy/magi:${TAG} -t ghcr.io/j33pguy/magi:latest .
          docker push ghcr.io/j33pguy/magi:${TAG}
          docker push ghcr.io/j33pguy/magi:latest
