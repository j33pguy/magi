name: Auto-assign PRs to j33pguy

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR to j33pguy
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['j33pguy']
            });
            console.log('Assigned PR #' + context.issue.number + ' to j33pguy');
