name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Only run for trusted actors (repo owner + dependabot)

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    # Only run for repo owner
    if: github.actor == 'j33pguy' || github.actor == 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.actor == 'j33pguy'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: go build -o REDACTED .

      - name: Get deploy key from Vault
        env:
          REDACTED: ${{ secrets.REDACTED }}
          REDACTED: "true"
          VAULT_ROLE_ID: ${{ secrets.REDACTED }}
          VAULT_SECRET_ID: ${{ secrets.REDACTED }}
        run: |
          VAULT_TOKEN=$(curl -sk -X POST ${REDACTED}/v1/auth/approle/login \
            -d "{\"role_id\":\"${VAULT_ROLE_ID}\",\"secret_id\":\"${VAULT_SECRET_ID}\"}" \
            | jq -r '.auth.client_token')
          curl -sk -H "X-Vault-Token: ${VAULT_TOKEN}" \
            ${REDACTED}/v1/secret/data/ssh | jq -r '.data.data.REDACTED' \
            > /tmp/REDACTED_KEY
          chmod 600 /tmp/REDACTED_KEY

      - name: Deploy binary
        env:
          REDACTED: ${{ secrets.REDACTED }}
          REDACTED: ${{ secrets.REDACTED }}
          REDACTED: ${{ secrets.REDACTED }}
        run: |
          scp -i /tmp/REDACTED_KEY -o StrictHostKeyChecking=no \
            REDACTED ${REDACTED}@${REDACTED}:REDACTED
          ssh -i /tmp/REDACTED_KEY -o StrictHostKeyChecking=no \
            ${REDACTED}@${REDACTED} \
            "sudo /usr/bin/install -m 755 REDACTED ${REDACTED}/bin/magi && rm -f REDACTED"

      - name: Restart service
        env:
          REDACTED: ${{ secrets.REDACTED }}
          REDACTED: ${{ secrets.REDACTED }}
        run: |
          ssh -i /tmp/REDACTED_KEY -o StrictHostKeyChecking=no \
            ${REDACTED}@${REDACTED} \
            'sudo systemctl restart magi'

      - name: Health check
        env:
          REDACTED: ${{ secrets.REDACTED }}
          REDACTED: ${{ secrets.REDACTED }}
        run: |
          sleep 4
          ssh -i /tmp/REDACTED_KEY -o StrictHostKeyChecking=no \
            ${REDACTED}@${REDACTED} \
            'status=$(sudo systemctl is-active magi); echo "magi is $status"; [ "$status" = "active" ]'

      - name: Cleanup
        if: always()
        run: rm -f /tmp/REDACTED_KEY REDACTED
