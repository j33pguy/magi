name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  deploy:
    name: Deploy to memory01
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: go build -o /tmp/claude-memory-new .

      - name: Deploy binary
        run: |
          sudo install -m 755 /tmp/claude-memory-new /opt/claude-memory/bin/claude-memory
          rm -f /tmp/claude-memory-new

      - name: Restart service
        run: sudo systemctl restart claude-memory

      - name: Health check
        run: |
          sleep 4
          status=$(sudo systemctl is-active claude-memory)
          echo "claude-memory is $status"
          [ "$status" = "active" ]
