name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: [self-hosted, claude-memory]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  deploy:
    name: Deploy to memory01
    runs-on: [self-hosted, claude-memory]
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: go build -o /tmp/claude-memory-new .

      - name: Deploy binary to memory01
        run: |
          scp -i /home/runner/.ssh/ansible_ed25519 -o StrictHostKeyChecking=no \
            /tmp/claude-memory-new ansible@10.5.5.40:/tmp/claude-memory-new
          ssh -i /home/runner/.ssh/ansible_ed25519 -o StrictHostKeyChecking=no \
            ansible@10.5.5.40 \
            'sudo /usr/bin/install -m 755 /tmp/claude-memory-new /opt/claude-memory/bin/claude-memory && rm -f /tmp/claude-memory-new'

      - name: Restart service on memory01
        run: |
          ssh -i /home/runner/.ssh/ansible_ed25519 -o StrictHostKeyChecking=no \
            ansible@10.5.5.40 \
            'sudo systemctl restart claude-memory'

      - name: Health check
        run: |
          sleep 4
          ssh -i /home/runner/.ssh/ansible_ed25519 -o StrictHostKeyChecking=no \
            ansible@10.5.5.40 \
            'status=$(sudo systemctl is-active claude-memory); echo "claude-memory is $status"; [ "$status" = "active" ]'

      - name: Cleanup
        if: always()
        run: rm -f /tmp/claude-memory-new
