name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: [self-hosted, homelab]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # self-hosted runners can't reach GitHub Actions cache service

      - name: Build
        run: go build -trimpath ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  deploy:
    name: Deploy to memory01
    runs-on: [self-hosted, homelab]
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # self-hosted runners can't reach GitHub Actions cache service

      - name: Build production binary
        run: go build -trimpath -o /tmp/claude-memory-new .

      - name: Get Ansible SSH key from Vault
        run: |
          echo "Fetching Vault token..."
          VAULT_RESP=$(curl -sk -X POST https://10.5.5.30:8200/v1/auth/approle/login \
            -d "{\"role_id\":\"${{ secrets.ANSIBLE_ROLE_ID }}\",\"secret_id\":\"${{ secrets.ANSIBLE_SECRET_ID }}\"}") 
          echo "Vault login status: $(echo $VAULT_RESP | jq -r '.auth.client_token // .errors[0] // "unknown"' | cut -c1-8)..."
          VAULT_TOKEN=$(echo $VAULT_RESP | jq -r '.auth.client_token')
          if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then
            echo "ERROR: Failed to get Vault token"
            echo "$VAULT_RESP" | jq .
            exit 1
          fi
          mkdir -p ~/.ssh
          SSH_RESP=$(curl -sk -H "X-Vault-Token: $VAULT_TOKEN" \
            https://10.5.5.30:8200/v1/homelab/data/ssh)
          KEY=$(echo "$SSH_RESP" | jq -r '.data.data.ansible_private_key')
          if [ -z "$KEY" ] || [ "$KEY" = "null" ]; then
            echo "ERROR: Failed to get SSH key from Vault"
            echo "$SSH_RESP" | jq 'del(.data.data)'
            exit 1
          fi
          echo "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "SSH key written ($(wc -c < ~/.ssh/deploy_key) bytes)"
          ssh-keyscan -H 10.5.5.40 >> ~/.ssh/known_hosts 2>/dev/null
          echo "Known hosts updated"

      - name: Deploy to memory01
        run: |
          scp -i ~/.ssh/deploy_key /tmp/claude-memory-new ansible@10.5.5.40:/tmp/claude-memory-new
          ssh -i ~/.ssh/deploy_key ansible@10.5.5.40 "
            sudo install -m 755 /tmp/claude-memory-new /opt/claude-memory/bin/claude-memory &&
            rm -f /tmp/claude-memory-new &&
            sudo systemctl restart claude-memory &&
            sleep 4 &&
            sudo systemctl is-active claude-memory
          "

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key /tmp/claude-memory-new
