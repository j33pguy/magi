name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: [self-hosted, homelab]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  deploy:
    name: Deploy to memory01
    runs-on: [self-hosted, homelab]
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VAULT_ADDR: "https://10.5.5.30:8200"
      VAULT_SKIP_VERIFY: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: go build -o /tmp/magi-new .

      - name: Get deploy key from Vault
        env:
          VAULT_ROLE_ID: ${{ secrets.ANSIBLE_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.ANSIBLE_SECRET_ID }}
        run: |
          VAULT_TOKEN=$(curl -sk -X POST ${VAULT_ADDR}/v1/auth/approle/login \
            -d "{\"role_id\":\"${VAULT_ROLE_ID}\",\"secret_id\":\"${VAULT_SECRET_ID}\"}" \
            | jq -r '.auth.client_token')
          curl -sk -H "X-Vault-Token: ${VAULT_TOKEN}" \
            ${VAULT_ADDR}/v1/homelab/data/ssh | jq -r '.data.data.ansible_private_key' \
            > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Deploy binary to memory01
        run: |
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            /tmp/magi-new ansible@10.5.5.40:/tmp/magi-new
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ansible@10.5.5.40 \
            'sudo /usr/bin/install -m 755 /tmp/magi-new /opt/magi/bin/magi && rm -f /tmp/magi-new'

      - name: Restart service on memory01
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ansible@10.5.5.40 \
            'sudo systemctl restart magi'

      - name: Health check
        run: |
          sleep 4
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ansible@10.5.5.40 \
            'status=$(sudo systemctl is-active magi); echo "magi is $status"; [ "$status" = "active" ]'

      - name: Cleanup
        if: always()
        run: rm -f /tmp/deploy_key /tmp/magi-new
