name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Restrict permissions to minimum needed
permissions:
  contents: read
  statuses: write

jobs:
  # Build/test uses GitHub-hosted Linux so dependency PRs and main pushes
  # are not blocked when the private self-hosted runner pool is offline.
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        env:
          MAGI_API_TOKEN: test
        run: CGO_ENABLED=1 go test ./... -count=1 -short
