services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: magi
      POSTGRES_PASSWORD: magi
      POSTGRES_DB: magi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magi -d magi"]
      interval: 5s
      timeout: 5s
      retries: 12

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: magi
      MYSQL_DATABASE: magi
      MYSQL_USER: magi
      MYSQL_PASSWORD: magi
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-pmagi"]
      interval: 5s
      timeout: 5s
      retries: 12

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "MagiPass123!"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'MagiPass123!' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
